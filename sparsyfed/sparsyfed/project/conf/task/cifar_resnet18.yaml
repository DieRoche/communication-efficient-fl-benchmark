---
# These strings are constants used by the dispatcher to select functionality at runtime
# Choose the model and dataset
#model_and_data: CIFAR_RN18
#model_and_data: CIFAR_EFFNET_B0
model_and_data: CIFAR_SPARSYFED_RN18
# model_and_data: CIFAR_SPARSYFED_NA_RN18
# model_and_data: CIFAR_ZEROFL_RN18
# model_and_data: CIFAR_FLASH_RN18
#model_and_data: CIFAR_SPARSYFED_EFFNET_B0

# Choose the train, test and server fed_eval functions
#train_structure: CIFAR_RN18
# train_structure: CIFAR_EFFNET_B0
#train_structure: CIFAR_EFFNET_B0_PRUNE
train_structure: CIFAR_RN18_PRUNE
# train_structure: CIFAR_RN18_FIX_PRUNE

alpha: 1.25
sparsity: 0.90
mask: 0.0

transport_compression: &transport_compression
  enabled: true
  compress_uplink: true
  compress_downlink: false
  format: csr_header_arrays_v1
  first_round_policy: measured_auto
  later_round_policy: config_sparsity
  csr_min_sparsity: 0.90
  mask_values_below_sparsity: 0.85
  strict_after_first_round: true
  allow_dense_fallback_after_first_round: false
  compress_only_float_tensors: true
  keep_integer_buffers_dense: true
  min_tensor_size: 1024
  index_dtype: int32
  value_dtype: float32
  target_sparsity: ${task.sparsity}

# Client fit config double
fit_config:
  # Net does not require any configuration
  net_config: {}
  # Dataloader requires batch_size
  dataloader_config:
    batch_size: 128
  # The train function requires epochs and learning_rate
  run_config:
    epochs: 5
    learning_rate: 0.01
    final_learning_rate: 0.01
    warmup_rounds: 0
    warmup: 0
    tot_rounds: 100
  extra:
    window_training: false
    in_out_eval: false
    mask: false
    noise: 0
    transport_compression: *transport_compression

# Client eval config
eval_config:
  net_config: {}
  # The testing function batch size can be as high as the GPU supports
  dataloader_config:
    batch_size: 128
  # Unlike train, the mnist train function takes no parameters?
  run_config: {}
  extra: {window_training: false, mask: false}

# Configuration for the federated testing function
# Follows the same conventions as the client config
fed_test_config:
  net_config: {}
  # The testing function batch size can be as high as the GPU supports
  dataloader_config:
    batch_size: 128
  # Unlike train, the mnist train function takes no parameters?
  run_config: {}
  extra: {}

# Configuration instructions for initial parameter 
# generation
net_config_initial_parameters: {}

# The names of metrics you wish to aggregate
fit_metrics: []

evaluate_metrics:
  - test_accuracy
  # From Hetero Exps
  # - test_accuracy_0.9
  # - test_accuracy_0.95
  # - test_accuracy_0.99
  # - test_accuracy_0.995
  # - test_accuracy_0.999
  - sparsity
